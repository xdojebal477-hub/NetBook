spring.application.name=netbook
# ----------------------------------------
# 1. CONFIGURACIÓN GENERAL DEL SERVIDOR
# ----------------------------------------


server.port=${PORT:8080}

# ----------------------------------------
# 2. CONEXIÓN A LA BASE DE DATOS
# ----------------------------------------
# Railway injects JDBC_URL, DB_USER, and DB_PASSWORD as OS environment variables.
# Spring Boot's property placeholder resolver reads OS env vars directly, so
# ${JDBC_URL} will resolve to the value Railway has set. No colon-default is
# provided here so that a missing variable causes a clear startup failure rather
# than silently connecting to a non-existent local database.
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:netbook}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Give the Railway MySQL service time to accept connections before HikariCP gives up
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

# ----------------------------------------
# 3. CONFIGURACIÓN DEL ORM (JPA / HIBERNATE)
# ----------------------------------------
# validate: Hibernate validates that the existing schema matches the entity
# mappings on startup. DDL is never modified — schema.sql ran once at
# provisioning time and the tables are expected to already exist.
spring.jpa.hibernate.ddl-auto=validate

# ----------------------------------------
# 3b. INICIALIZACIÓN DEL ESQUEMA SQL
# ----------------------------------------
# never: schema.sql was executed once at database provisioning time. Skipping
# SQL initialisation on every boot prevents "table already exists" errors and
# removes an unnecessary round-trip to the database during startup.
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:schema.sql
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------
# 4. CONFIGURACIÓN SEGURIDAD (JWT)
# ----------------------------------------
# secret key para local (leer desde variable de entorno)
jwt.secret=${JWT_SECRET:WWvQSo3qLzOhG6MG1GF0XFMvWJz8EUQbO9vJ6RNvNGA=}
# Expiración: 24 horas  (1000 * 60 * 60 * 24)
jwt.expiration=86400000  
# AUMENTAR LIMITES DE SUBIDA PARA ARCHIVOS PESADOS (PDF de 50MB)  
spring.servlet.multipart.max-file-size=50MB  
spring.servlet.multipart.max-request-size=50MB 

# Directorio para uploads (soporta inyección desde Railway volumes)
file.upload-dir=${UPLOAD_DIR:uploads/}
app.public-base-url=${PUBLIC_BASE_URL:http://localhost:8080}
