spring.application.name=netbook
# ----------------------------------------
# 1. CONFIGURACIÓN GENERAL DEL SERVIDOR
# ----------------------------------------


server.port=8081

# ----------------------------------------
# 2. CONEXIÓN A LA BASE DE DATOS
# ----------------------------------------
# Railway injects JDBC_URL, DB_USER, and DB_PASSWORD as OS environment variables.
# Spring Boot's property placeholder resolver reads OS env vars directly, so
# ${JDBC_URL} will resolve to the value Railway has set. No colon-default is
# provided here so that a missing variable causes a clear startup failure rather
# than silently connecting to a non-existent local database.
spring.datasource.url=${JDBC_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Give the Railway MySQL service time to accept connections before HikariCP gives up
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

# ----------------------------------------
# 3. CONFIGURACIÓN DEL ORM (JPA / HIBERNATE)
# ----------------------------------------
# none: Hibernate does not touch the schema; Spring Boot's SQL initialiser
# (schema.sql) is solely responsible for DDL on every startup.
spring.jpa.hibernate.ddl-auto=none

# ----------------------------------------
# 3b. INICIALIZACIÓN DEL ESQUEMA SQL
# ----------------------------------------
# always: Spring Boot executes schema.sql on every startup before Hibernate
# initialises. All CREATE TABLE statements use IF NOT EXISTS, so re-runs on an
# already-provisioned database are safe and idempotent. This makes every
# deployment fully self-contained — if the database is wiped, a redeploy
# recreates the schema automatically.
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------
# 4. CONFIGURACIÓN SEGURIDAD (JWT)
# ----------------------------------------
# secret key para local (leer desde variable de entorno)
jwt.secret=${JWT_SECRET:}
# Expiración: 24 horas  (1000 * 60 * 60 * 24)
jwt.expiration=86400000  
# AUMENTAR LIMITES DE SUBIDA PARA ARCHIVOS PESADOS (PDF de 50MB)  
spring.servlet.multipart.max-file-size=50MB  
spring.servlet.multipart.max-request-size=50MB 

# Directorio para uploads (soporta inyección desde Railway volumes)
file.upload-dir=${UPLOAD_DIR:uploads/}
