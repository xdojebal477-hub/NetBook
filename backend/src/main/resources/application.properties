spring.application.name=netbook
# ----------------------------------------
# 1. CONFIGURACIÓN GENERAL DEL SERVIDOR
# ----------------------------------------


server.port=8081

# ----------------------------------------
# 2. CONEXIÓN A LA BASE DE DATOS (DOCKER)
# ----------------------------------------
spring.datasource.url=${JDBC_URL:jdbc:mysql://localhost:3307/netbook_db?serverTimezone=UTC}
spring.datasource.username=${DB_USER:netbook_user}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------------
# 3. CONFIGURACIÓN DEL ORM (JPA / HIBERNATE)
# ----------------------------------------
# Le decimos a Spring que NO cree ni borre tablas, solo que "valide" que existen
spring.jpa.hibernate.ddl-auto=validate

# ----------------------------------------
# 3b. INICIALIZACIÓN DEL ESQUEMA SQL
# ----------------------------------------
# Ejecutar schema.sql al arrancar (necesario para bases de datos no embebidas)
spring.sql.init.mode=always
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------
# 4. CONFIGURACIÓN SEGURIDAD (JWT)
# ----------------------------------------
# secret key para local (leer desde variable de entorno)
jwt.secret=${JWT_SECRET:}
# Expiración: 24 horas  (1000 * 60 * 60 * 24)
jwt.expiration=86400000  
# AUMENTAR LIMITES DE SUBIDA PARA ARCHIVOS PESADOS (PDF de 50MB)  
spring.servlet.multipart.max-file-size=50MB  
spring.servlet.multipart.max-request-size=50MB 

# Directorio para uploads (soporta inyección desde Railway volumes)
file.upload-dir=${UPLOAD_DIR:uploads/}
