<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-4xl mx-auto">
    <!-- Botón Volver -->
    <button (click)="volver()" class="mb-4 flex items-center text-sm font-medium text-indigo-600 hover:text-indigo-800 transition-colors">
      <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Volver al catálogo
    </button>

    <app-loading-state *ngIf="cargando" message="Cargando detalles de la obra..." subtitle="Recuperando sinopsis, portada y opciones de lectura." [overlay]="true"></app-loading-state>

    <!-- Estado Cargando / Error -->
    <div *ngIf="error" class="bg-red-50 border border-red-200 text-red-800 rounded-lg p-6 text-center">
      <p>{{ error }}</p>
    </div>

    <!-- Contenedor Principal Libro -->
    <div *ngIf="!cargando && !error && libro" class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col md:flex-row">
      <!-- Portada (Imitada) -->
      <div class="md:w-1/3 bg-gradient-to-br from-indigo-100 to-purple-100 p-8 flex items-center justify-center border-b md:border-b-0 md:border-r border-gray-100">
        <div class="w-full aspect-[2/3] bg-white rounded shadow-md flex items-center justify-center overflow-hidden relative">
          <!-- Si tuviera portada real -->
          <img *ngIf="libro.portadaUrl" [src]="libro.portadaUrl" [alt]="libro.titulo" class="w-full h-full object-cover">
          <!-- Placeholder si no hay portada -->
          <div *ngIf="!libro.portadaUrl" class="text-center p-4">
            <svg class="w-16 h-16 text-indigo-300 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
            <h3 class="font-bold text-gray-800 text-sm line-clamp-3">{{ libro.titulo }}</h3>
          </div>
        </div>
      </div>

      <!-- Info del Libro -->
      <div class="md:w-2/3 p-8 flex flex-col">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <span class="px-2.5 py-1 bg-indigo-50 text-indigo-700 text-xs font-semibold rounded-full tracking-wide">
              {{ libro.genero || 'Sin género' }}
            </span>
            <span *ngIf="libro.estado === 'PUBLICO'" class="px-2.5 py-1 bg-green-50 text-green-700 text-xs font-semibold rounded-full">Público</span>
          </div>

          <h1 class="text-3xl font-bold text-gray-900 mb-2">{{ libro.titulo }}</h1>
          <p class="text-lg text-gray-600 font-medium mb-6">Por <span class="text-indigo-600">{{ libro.autorNombre }}</span></p>

          <div class="prose prose-sm sm:prose text-gray-700 mb-8 whitespace-pre-line">
            <p *ngIf="libro.sinopsis">{{ libro.sinopsis }}</p>
            <p *ngIf="!libro.sinopsis" class="italic text-gray-400">Este libro no cuenta con sinopsis por el momento.</p>
          </div>
        </div>

        <div class="mt-auto pt-6 border-t border-gray-100 flex flex-col sm:flex-row items-center gap-4">
          <!-- Botón de Leer (Navega al Visor) -->
          <button (click)="empezarALeer()" class="w-full sm:w-1/2 flex items-center justify-center gap-2 bg-indigo-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-indigo-700 transition shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
            Comenzar Lectura
          </button>

          <!-- Colecciones Seleccionar -->
          <div *ngIf="authService.isLoggedIn()" class="w-full sm:w-1/2 flex items-center gap-2">
            <select *ngIf="colecciones.length > 0" [(ngModel)]="coleccionSeleccionada" class="flex-1 px-3 py-3 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none w-full bg-white">
              <option [ngValue]="null" disabled>Añadir a mi colección...</option>
              <option *ngFor="let col of colecciones" [ngValue]="col.id">{{ col.nombre }}</option>
            </select>
            <button *ngIf="colecciones.length > 0" (click)="anadirAColeccion()" [disabled]="!coleccionSeleccionada" class="px-4 py-3 bg-gray-100 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-200 disabled:opacity-50 transition-colors font-medium text-sm">
              Guardar
            </button>
            <p *ngIf="colecciones.length === 0" class="text-xs text-gray-500 italic w-full text-center">No tienes colecciones aún.</p>
          </div>
        </div>

        <!-- Mensaje de Éxito al guardar colección -->
        <div *ngIf="mensajeExito" class="mt-4 bg-green-50 text-green-700 text-sm p-3 rounded border border-green-200 text-center animate-pulse">
          {{ mensajeExito }}
        </div>

      </div>
    </div>

    <!-- Sección de Reseñas -->
    <div *ngIf="!cargando && !error && libro" class="mt-8">
      <!-- Formulario para escribir/editar reseña (solo si está autenticado) -->
      <app-form-resena
        *ngIf="authService.isLoggedIn()"
        [libroId]="libro.id"
        (resenaGuardada)="onResenaGuardada()">
      </app-form-resena>

      <!-- Lista de reseñas del libro -->
      <app-lista-resenas
        [libroId]="libro.id"
        [ratingPromedio]="ratingPromedio"
        [countResenas]="countResenas">
      </app-lista-resenas>
    </div>
  </div>
</div>
