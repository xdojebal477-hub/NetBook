<div class="min-h-screen bg-gray-50 flex flex-col">
  <!-- Cabecera del visor -->
  <div class="bg-white shadow-sm border-b border-gray-200 px-4 py-3 flex items-center justify-between z-10 sticky top-0">
    <button (click)="volver()" class="flex items-center text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition-colors bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-md">
      <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Volver
    </button>
    <div class="text-sm font-bold text-gray-700 hidden sm:block">Modo Lectura</div>
    <div class="w-20"></div> <!-- Espaciador para centrar el texto anterior -->
  </div>

  <app-loading-state *ngIf="cargando" message="Preparando tu lectura..." subtitle="Descargando y renderizando el documento de forma segura." [overlay]="true"></app-loading-state>

  <!-- Contenedor del Visor -->
  <div class="flex-grow flex flex-col items-center justify-center p-4">

    <!-- Estado Error -->
    <div *ngIf="!cargando && error" class="bg-red-50 border border-red-200 rounded-xl p-8 max-w-lg w-full text-center shadow-sm">
      <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
      </div>
      <h3 class="text-lg font-bold text-gray-900 mb-2">Imposible cargar el libro</h3>
      <p class="text-gray-600 mb-6">{{ error }}</p>
      <button (click)="volver()" class="px-6 py-2 bg-red-600 text-white font-medium rounded-lg hover:bg-red-700 transition">
        Volver atrás
      </button>
    </div>

    <!-- Visor PDF para escritorio -->
    <div *ngIf="!cargando && !error && pdfUrl && !esMovil" class="w-full max-w-6xl flex-grow bg-white shadow-lg rounded-xl overflow-hidden border border-gray-300 flex flex-col h-[80vh]">
      <iframe [src]="pdfUrl" class="w-full h-full" title="Visor de lectura" allowfullscreen></iframe>
    </div>

    <!-- En movil abrimos el PDF en visor externo para evitar fallos de iframe en Android/iOS -->
    <div *ngIf="!cargando && !error && pdfUrl && esMovil" class="w-full max-w-lg bg-white border border-gray-200 rounded-2xl shadow-sm p-6 text-center">
      <div class="w-14 h-14 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
        </svg>
      </div>
      <h3 class="text-lg font-bold text-gray-900 mb-2">Listo para leer</h3>
      <p class="text-sm text-gray-600 mb-5">En algunos moviles el visor integrado puede fallar. Pulsa para abrir el libro en el visor del navegador.</p>
      <button (click)="abrirEnVisorExterno()" class="w-full px-5 py-3 rounded-xl bg-indigo-600 text-white font-semibold hover:bg-indigo-700 transition-colors">
        Abrir lectura
      </button>
    </div>

  </div>
</div>
